esphome:
  name: powerhub
  friendly_name: M5Stack PowerHub
  name_add_mac_suffix: true
  on_boot:
    then:
      # read the RTC time once when the system boots
      powerhub.read_time:
  project:
    name: m5stack.powerhub
    version: 2026.3.0

esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG

improv_serial:

esp32_improv:
  authorizer: none

wifi:
  on_connect:
    - delay: 5s  # Gives time for improv results to be transmitted
    - ble.disable:
  on_disconnect:
    - ble.enable:
  ap:

captive_portal:

api:

ota:
  - platform: esphome

i2c:
  sda:
    number: GPIO45
    ignore_strapping_warning: true
  scl: GPIO48

uart:
  - id: rs485_bus
    tx_pin: GPIO8
    rx_pin: GPIO17
    baud_rate: 115200
  - id: can_bus
    tx_pin: GPIO39
    rx_pin: GPIO40
    baud_rate: 115200


external_components:
  - source: github://m5stack/esphome-yaml/components@main
    components: powerhub
    refresh: 0s

powerhub:


time:
  - platform: powerhub
    # repeated synchronization is not necessary unless the external RTC
    # is much more accurate than the internal clock
    update_interval: never
  
  - platform: homeassistant
    # instead try to synchronize via network repeatedly ...
    on_time_sync:
      then:
        # ... and update the RTC when the synchronization was successful
        powerhub.write_time:

binary_sensor:
  - platform: gpio
    name: "USER Button"
    id: usr_sw2_binary_sensor
    pin:
      number: GPIO11
      inverted: true
  - platform: powerhub
    button: 
      name: "Top PMU Button"

text_sensor:
  - platform: powerhub
    charge_status:
      name: "Battery Charge Status"
      id: bat_charge_status_text_sensor
      on_value:
        - lambda: |-
            static std::string last_state = "";
            if (last_state == x) return; 
            last_state = x;

            auto call = id(led_bat_charge).turn_on();
            call.set_brightness(0.9);
            call.set_color_mode(ColorMode::RGB);

            if (x == "Charging") {
              // Pulse green
              call.set_rgb(0, 1.0, 0);
              call.set_effect("Slow Pulse");
            } else if (x == "Discharging") {
              // Solid green
              call.set_rgb(0, 1.0, 0);
              call.set_effect("None");
            } else {
              // Solid white
              call.set_rgb(1.0, 1.0, 1.0);
              call.set_effect("None");
            }
            call.perform();
    vin_status:
      name: "External Input Power Status"
      id: ext_vin_status_text_sensor


sensor:
  - platform: powerhub
    battery_voltage:
      name: "Battery Voltage"
      id: bat_volt_sensor
      filters:
        - delta: 50  # Only publish if voltage changes by 50mV
    battery_current:
      name: "Battery Current"
      id: bat_curr_sensor
      filters:
        - delta: 20  # Only publish if current changes by 20mA
    battery_level:
      name: "Battery Percentage"
      id: bat_level_sensor
      filters:
        - delta: 1  # Only publish if battery level changes by 1%
      on_value:
        - lambda: |-
            auto call_1 = id(led_pwr_l).turn_on();
            auto call_2 = id(led_pwr_r).turn_on();
            auto call_off_1 = id(led_pwr_l).turn_off();
            auto call_off_2 = id(led_pwr_r).turn_off();
            call_1.set_transition_length(1000);
            call_2.set_transition_length(1000);
            call_off_1.set_transition_length(1000);
            call_off_2.set_transition_length(1000);
            call_1.set_color_mode(ColorMode::RGB);
            call_2.set_color_mode(ColorMode::RGB);
            // if read battery level is unknown
            // set the LED color to white
            if ( std::isnan(x) ) {
              call_1.set_rgb(1.0, 1.0, 1.0);
              call_2.set_rgb(1.0, 1.0, 1.0);
              call_1.set_brightness(1.0);
              call_2.set_brightness(1.0);
              call_1.perform();
              call_2.perform();
              return;
            }

            if ( x > 80.0f && x <= 100.0f ) {
                call_1.set_rgb(0, 1.0, 0);
                call_2.set_rgb(0, 1.0, 0);
                call_1.set_brightness(1.0);
                call_2.set_brightness(1.0);
                call_1.perform();
                call_2.perform();
            } else if ( x > 50.0f && x <= 80.0f ) {
                call_1.set_rgb(0, 1.0, 0);
                call_2.set_rgb(0, 1.0, 0);
                call_1.set_brightness(1.0);
                call_2.set_brightness(0.8);
                call_1.perform();
                call_2.perform();
            } else if ( x > 20.0f && x <= 50.0f ) {
                call_1.set_rgb(1.0, 0.95, 0.19); // left only one LED on with YELLOW color suggest low power
                call_1.set_brightness(1.0);
                call_1.perform();
                call_off_2.perform();
            } else if ( x > 5.0f && x <= 20.0f ){
                call_1.set_rgb(1.0, 0.43, 0.32); // left only one LED on with RED color suggest extremely low power
                call_1.set_brightness(0.8);
                call_1.perform();
                call_off_2.perform();
            } else {
                call_1.set_rgb(1.0, 0.43, 0.32);
                call_1.set_brightness(0.8); // almost empty
                call_1.perform();
                call_off_2.perform();
            }

    grove_red_voltage:
      name: "Port.A Voltage"
      id: grove_red_volt_sensor
      filters:
        - delta: 50  # Only publish if voltage changes by 50mV
    grove_red_current:
      name: "Port.A Current"
      id: grove_red_curr_sensor
      filters:
        - delta: 20  # Only publish if current changes by 20mA
    grove_blue_voltage:
      name: "Port.C Voltage"
      id: grove_blue_volt_sensor
      filters:
        - delta: 50  # Only publish if voltage changes by 50mV
    grove_blue_current:
      name: "Port.C Current"
      id: grove_blue_curr_sensor
      filters:
        - delta: 20  # Only publish if current changes by 20mA
    can_voltage:
      name: "CAN Voltage"
      id: can_volt_sensor
      filters:
        - delta: 50  # Only publish if voltage changes by 50mV
    can_current:
      name: "CAN Current"
      id: can_curr_sensor
      filters:
        - delta: 20  # Only publish if current changes by 20mA
    rs485_voltage:
      name: "RS485 Voltage"
      id: rs485_volt_sensor
      filters:
        - delta: 50  # Only publish if voltage changes by 50mV
    rs485_current:
      name: "RS485 Current"
      id: rs485_curr_sensor
      filters:
        - delta: 20  # Only publish if current changes by 20mA
    usb_voltage:
      name: "USB Voltage"
      id: usb_volt_sensor
      filters:
        - delta: 50  # Only publish if voltage changes by 50mV
    usb_current:
      name: "USB Current"
      id: usb_curr_sensor
      filters:
        - delta: 20  # Only publish if current changes by 20mA


switch:
  - platform: powerhub
    channel: LED
    name: "LED Power"
    id: led_pwr_switch
    restore_mode: RESTORE_DEFAULT_ON

  - platform: powerhub
    channel: USB
    name: "USB Power"
    id: usb_pwr_switch
    on_turn_on:
      - light.turn_on:
          id: led_usb_a
          brightness: 90%
      - light.turn_on:
          id: led_usb_c
          brightness: 90%
    on_turn_off:
      - light.turn_off:
          id: led_usb_a
      - light.turn_off:
          id: led_usb_c

  - platform: powerhub
    channel: GROVE_RED
    name: "Port.A Power"
    id: grove_red_pwr_switch
    on_turn_on:
      - light.turn_on:
          id: led_grove_red
          brightness: 90%
    on_turn_off:
      - light.turn_off:
          id: led_grove_red

  - platform: powerhub
    channel: GROVE_BLUE
    name: "Port.C Power"
    id: grove_blue_pwr_switch
    on_turn_on:
      - light.turn_on:
          id: led_grove_blue
          brightness: 90%
    on_turn_off:
      - light.turn_off:
          id: led_grove_blue

  - platform: powerhub
    channel: RS485_CAN
    name: "RS485&CAN Power"
    id: rs485_can_pwr_switch
    on_turn_on:
      - light.turn_on:
          id: led_rs485_can
          brightness: 90%
    on_turn_off:
      - light.turn_off:
          id: led_rs485_can

  - platform: powerhub
    channel: CHARGE
    name: "Charge Power"
    id: charge_pwr_switch
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - light.turn_on:
          id: led_bat_charge
          brightness: 90%
    on_turn_off:
      - light.turn_off:
          id: led_bat_charge

  - platform: powerhub
    channel: VAMETER
    name: "VAMeter Power"
    id: vameter_pwr_switch
    restore_mode: RESTORE_DEFAULT_ON

  - platform: powerhub
    name: "RS485 CAN Direction"
    id: rs485_can_dir


select:
  - platform: powerhub
    usb_mode:
      name: "USB Mode"
      id: usb_mode_select

number:
  - platform: powerhub
    rs485_can_output_voltage:
      name: "RS485&CAN Output Voltage"
      mode: "box"
    rs485_can_current_limit:
      name: "RS485&CAN Output Current Limit"
      mode: "box"

light:
  - platform: powerhub
    channel: USB_A
    name: "USB A Light"
    id: led_usb_a

  - platform: powerhub
    channel: USB_C
    name: "USB C Light"
    id: led_usb_c

  - platform: powerhub
    channel: GROVE_BLUE
    name: "Port.C Light"
    id: led_grove_blue

  - platform: powerhub
    channel: GROVE_RED
    name: "Port.A Light"
    id: led_grove_red

  - platform: powerhub
    channel: RS485_CAN
    name: "RS485&CAN Light"
    id: led_rs485_can

  - platform: powerhub
    channel: CHARGE
    name: "Battery Charge Light"
    id: led_bat_charge
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 500ms
          update_interval: 2s

  - platform: powerhub
    channel: POWER_LEFT
    name: "Power L Light"
    id: led_pwr_l

  - platform: powerhub
    channel: POWER_RIGHT
    name: "Power R Light"
    id: led_pwr_r