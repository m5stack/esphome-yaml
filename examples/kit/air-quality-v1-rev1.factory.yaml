packages:
  m5stack-airq-v1-rev1: !include ../../common/air-quality-v1-rev1-base.yaml

esphome:
  project:
    name: m5stack.air-quality-v1-rev1
    version: 2026.3.0

dashboard_import:
  package_import_url: github://m5stack/esphome-yaml/common/air-quality-v1-rev1-base.yaml@main

wifi:
  on_connect:
    - delay: 5s  # Gives time for improv results to be transmitted
    - ble.disable:
  on_disconnect:
    - ble.enable:

improv_serial:

esp32_improv:
  authorizer: none