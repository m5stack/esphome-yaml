esphome:
  name: unit-tmos
  friendly_name: Unit TMOS

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: ""

ota:
  - platform: esphome
    password: "7251c3c1477c19ec0aecae9b1953e9e7"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Unit-Tmos Fallback Hotspot"
    password: "047BAbG8PLK3"

external_components:
  - source: github://m5stack/esphome-yaml/components
    components: [sths34pf80]
    refresh: 0s

i2c:
  sda: GPIO2
  scl: GPIO1
  scan: true

sensor:
  - platform: sths34pf80
    pres_flag:
      name: "TMOS Presence Detected"
    mot_flag:
      name: "TMOS Motion Detected"
    presence_threshold: 200   
    motion_threshold: 200     
    presence_hysteresis: 50   
    motion_hysteresis: 50     
    odr: 8          
    update_interval: 1s   

captive_portal:
    